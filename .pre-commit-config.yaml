# JCIA Pre-commit Hooks - 工程纪律强制执行配置
# ⚠️ 警告: 此配置强制在每次提交前执行完整的质量门禁检查
# 任何检查失败都会阻止提交！

repos:
  # Ruff: 极速 Python linter 和 formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        name: "📝 Ruff Lint 代码规范检查"
        args: [--fix]
        stages: [pre-commit]
        fail_fast: true
      - id: ruff-format
        name: "🎨 Ruff Format 代码格式化"
        stages: [pre-commit]
        fail_fast: true

  # Pyright: 微软静态类型检查器
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.340
    hooks:
      - id: pyright
        name: "🔍 Pyright 静态类型检查"
        stages: [pre-commit]
        fail_fast: true

  # Bandit: Python 安全漏洞扫描
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: "🔒 Bandit 安全漏洞扫描"
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        stages: [pre-commit]
        fail_fast: true

  # Pytest: 单元测试
  - repo: local
    hooks:
      - id: pytest-check
        name: "🧪 Pytest 单元测试"
        entry: .venv/Scripts/python.exe -m pytest tests/unit -v --tb=short -q

        language: system

        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        fail_fast: true

  # 工程纪律最终检查
  - repo: local
    hooks:
      - id: discipline-check
        name: "✅ 工程纪律完整性检查"
        entry: powershell -ExecutionPolicy Bypass -File scripts/enforce_discipline.ps1
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        fail_fast: true
